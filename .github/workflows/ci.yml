name: Go CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    # Running on macos-latest ensures you're testing on the actual Darwin kernel
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Check for tidy modules
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall

      - name: Test
        run: go test -v -race ./...

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Build binaries for testing
        run: |
          GOOS=darwin GOARCH=arm64 go build -o skel-arm64 .
          GOOS=darwin GOARCH=amd64 go build -o skel-amd64 .

      - name: Upload binaries for testing
        uses: actions/upload-artifact@v4
        with:
          name: skel-macos-all
          path: skel-*
          retention-days: 5