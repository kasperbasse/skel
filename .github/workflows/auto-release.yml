name: Auto Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (for example v0.2.0)
        required: true
      target:
        description: Branch to release from
        required: true
        default: main

permissions:
  contents: write
  actions: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1
        with:
          ref: ${{ inputs.target }}
          fetch-depth: 0

      - name: Validate target branch
        run: |
          if [ "${{ inputs.target }}" != "main" ]; then
            echo "Releases must be created from main (requested: ${{ inputs.target }})" >&2
            exit 1
          fi

      - name: Validate version and tag state
        id: version
        run: |
          VERSION="${{ inputs.version }}"

          if ! printf '%s' "$VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Version must match vMAJOR.MINOR.PATCH (got: $VERSION)" >&2
            exit 1
          fi

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag already exists: $VERSION" >&2
            exit 1
          fi

          if printf '%s' "$VERSION" | grep -Eq '^v0\.'; then
            echo "PRERELEASE=true" >> "$GITHUB_OUTPUT"
          else
            echo "PRERELEASE=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -z "$RELEASE_TOKEN" ]; then
            echo "RELEASE_TOKEN is required to create protected release tags." >&2
            echo "Add a repo secret named RELEASE_TOKEN and allow that token/app to create v* tags in your repository ruleset." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ inputs.version }}" -m "Release ${{ inputs.version }}"
          git remote set-url origin "https://x-access-token:${RELEASE_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "refs/tags/${{ inputs.version }}"

      - name: Generate changelog with git-cliff
        id: cliff
        uses: orhun/git-cliff-action@v4.7.1
        with:
          args: --tag ${{ inputs.version }} --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: Create Release
        uses: actions/github-script@v7.0.1
        with:
          script: |
            const changelog = process.env.CHANGELOG;
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ inputs.version }}',
              name: '${{ inputs.version }}',
              body: changelog,
              draft: false,
              prerelease: '${{ steps.version.outputs.PRERELEASE }}' === 'true',
              generate_release_notes: true,
            });
        env:
          CHANGELOG: ${{ steps.cliff.outputs.changelog }}

      - name: Trigger publish workflow
        uses: actions/github-script@v7.0.1
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release.yml',
              ref: '${{ inputs.target }}',
              inputs: {
                tag: '${{ inputs.version }}',
              },
            });

