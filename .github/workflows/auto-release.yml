name: Auto Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (for example v0.2.0)
        required: true
      target:
        description: Branch to release from
        required: true
        default: main

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1
        with:
          ref: ${{ inputs.target }}
          fetch-depth: 0

      - name: Validate target branch
        run: |
          if [ "${{ inputs.target }}" != "main" ]; then
            echo "Releases must be created from main (requested: ${{ inputs.target }})" >&2
            exit 1
          fi

      - name: Validate version and tag state
        id: version
        run: |
          VERSION="${{ inputs.version }}"

          if ! printf '%s' "$VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Version must match vMAJOR.MINOR.PATCH (got: $VERSION)" >&2
            exit 1
          fi

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag already exists: $VERSION" >&2
            exit 1
          fi

          if printf '%s' "$VERSION" | grep -Eq '^v0\.'; then
            echo "PRERELEASE=true" >> "$GITHUB_OUTPUT"
          else
            echo "PRERELEASE=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -n "$RELEASE_TOKEN" ]; then
            TOKEN="$RELEASE_TOKEN"
          else
            TOKEN="$GITHUB_TOKEN"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ inputs.version }}" -m "Release ${{ inputs.version }}"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "refs/tags/${{ inputs.version }}"

      - name: Create Release
        uses: actions/github-script@v7.0.1
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ inputs.version }}',
              name: 'Release ${{ inputs.version }}',
              draft: false,
              prerelease: '${{ steps.version.outputs.PRERELEASE }}' === 'true',
              generate_release_notes: true,
            });

