name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish (for example v0.3.0)
        required: true

permissions:
  contents: write

jobs:
  publish:
    name: Publish Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag input
        run: |
          if ! printf '%s' "${{ inputs.tag }}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "tag input must match vMAJOR.MINOR.PATCH (got: ${{ inputs.tag }})" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4.1.1
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5.0.0
        with:
          go-version: '1.25'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6.1.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Enforce prerelease flag from tag
        uses: actions/github-script@v7.0.1
        with:
          script: |
            const tag = '${{ inputs.tag }}';
            const prerelease = tag.startsWith('v0.');

            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              prerelease,
            });

            core.info(`Set prerelease=${prerelease} for ${tag}`);
