version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - gosec
    - bodyclose
    - nilerr
    - errorlint
  settings:
    misspell:
      locale: US
    gosec:
      excludes:
        - G204 # We intentionally call external commands (brew, code, etc.)
        - G304 # File paths are constructed from known safe sources (home dir + config names)
        - G404 # Weak random is fine for picking random UI messages

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/kasperbasse/skel

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
